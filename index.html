<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jamal Fahad | ICT Teacher & Digital Skills Trainer</title>

<meta name="description" content="Jamal Fahad - ICT Teacher, Pearson Edexcel ICT Specialist, Digital Skills Trainer, Web & Graphic Design Instructor in Hargeisa, Somaliland.">
<meta name="keywords" content="ICT Teacher Somaliland, Pearson Edexcel ICT, Digital Skills Trainer, Web Design Trainer, Hargeisa Teacher, ICT Education">

<meta property="og:title" content="Jamal Fahad - ICT Teacher Portfolio">
<meta property="og:image" content="profile.jpg">
<meta property="og:description" content="ICT Teacher and Digital Skills Trainer specializing in Pearson Edexcel ICT, web design, and digital literacy.">

<link href="https://fonts.googleapis.com/css2=family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --primary:#0f172a;
    --accent:#0284c7;
    --accent-hover:#0369a1;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#1e293b;
    --muted:#64748b;
    --border:#e2e8f0;
    --radius:12px;
    --shadow:0 10px 25px rgba(0,0,0,0.05);
}

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:var(--bg);
    color:var(--text);
    box-sizing: border-box;
    line-height: 1.6;
}

/* NAV */
header{
    position:fixed;
    width:100%;
    top:0;
    background:var(--primary);
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    box-sizing: border-box;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

header a{
    color:white;
    margin:0 12px;
    text-decoration:none;
    font-weight:600;
    font-size: 0.95rem;
    transition: color 0.2s ease;
}

header a:hover{color:#38bdf8}

/* HERO */
.hero{
    margin-top:70px;
    display:grid;
    grid-template-columns:1.2fr 0.8fr;
    padding:80px 60px;
    gap:50px;
    align-items:center;
}

.hero h1{
    font-size:42px;
    margin: 0 0 15px 0;
    line-height: 1.2;
}

.hero span{color:#38bdf8}

.profile-headline {
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.95rem;
    margin-bottom: 8px;
    display: block;
}

.hero p{
    color:var(--muted);
    font-size: 1.05rem;
    margin-bottom: 30px;
}

/* BUTTONS */
.btn{
    display:inline-flex;
    align-items: center;
    gap: 8px;
    padding:12px 22px;
    margin:10px 10px 0 0;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    border: none;
    cursor: pointer;
}

.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-hover); transform: translateY(-1px);}
.btn-dark{background:rgba(255,255,255,0.1);color:white; border: 1px solid rgba(255,255,255,0.2);}
.btn-dark:hover{background:rgba(255,255,255,0.2);}
.btn-secondary{background: #ffffff; color: var(--primary); border: 1px solid var(--border);}
.btn-secondary:hover{background: #f1f5f9; border-color: #94a3b8;}

.img-container {
    display: flex;
    justify-content: center;
}

img.profile-avatar {
    width: 100%;
    border-radius: 50%;
    max-width: 320px;
    height: 320px;
    object-fit: cover;
    border: 6px solid var(--card);
    box-shadow: var(--shadow);
}

/* SECTIONS & STRUCTURAL GRIDS */
section{
    padding:80px 60px;
    max-width: 1200px;
    margin: 0 auto;
}

section h2 {
    font-size: 2rem;
    margin-bottom: 30px;
    position: relative;
    padding-bottom: 10px;
}

section h2::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: 0;
    width: 50px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
}

.card{
    background:var(--card);
    padding:30px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-bottom:20px;
    border: 1px solid var(--border);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.two-col {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 40px;
}

/* METRICS COMPONENT */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 20px;
}

.metric-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
}

.metric-card h3 {
    margin: 0 0 5px 0;
    font-size: 2rem;
    color: var(--accent);
}

.metric-card p {
    margin: 0;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
}

/* PROGRESS BARS */
.skills-container {
    margin-top: 15px;
}

.skill-bar-wrapper {
    margin-bottom: 20px;
}

.skill-meta {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 6px;
}

.skill-track {
    background: var(--border);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
}

.skill-fill {
    background: linear-gradient(90deg, var(--accent), #38bdf8);
    height: 100%;
    border-radius: 4px;
}

/* CHIPS */
.chip-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 15px;
}

.chip {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
}

/* INTERACTIVE SEARCH & CATALOG ARCHITECTURE */
.filter-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
    background: var(--card);
    padding: 15px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
}

.search-box {
    position: relative;
    flex-grow: 1;
    max-width: 400px;
}

.search-box i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
}

.search-box input {
    width: 100%;
    padding: 10px 15px 10px 40px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
    box-sizing: border-box;
}

.tab-cluster {
    display: flex;
    gap: 8px;
}

.tab-btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
}

.tab-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}

.catalog-card {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.catalog-banner {
    padding: 20px;
    color: white;
    border-radius: 8px 8px 0 0;
    margin: -20px -20px 20px -20px;
    font-weight: 700;
}

/* MODAL SYSTEM LAYER */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(4px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.modal-content {
    background: var(--card);
    padding: 40px;
    border-radius: var(--radius);
    max-width: 650px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 45px rgba(0,0,0,0.15);
    border: 1px solid var(--border);
}

.close-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted);
}

.modal-section {
    margin-top: 20px;
}

.modal-section h4 {
    margin: 0 0 5px 0;
    color: var(--accent);
}

/* FOOTER & CONNECTIVITY VAULT */
.contact-grid {
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 40px;
}

.contact-link-card {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 15px;
}

.contact-link-card i {
    font-size: 1.5rem;
    color: var(--accent);
    background: var(--bg);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
}

.reference-node {
    border-left: 3px solid var(--accent);
    padding-left: 15px;
    margin-bottom: 25px;
}

.reference-node h4 { margin: 0; font-size: 1.1rem; }
.reference-node .title-stamp { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
.reference-node p { margin: 5px 0 0 0; font-style: italic; color: var(--muted); font-size: 0.92rem; }

footer{
    text-align:center;
    padding:40px;
    background:var(--primary);
    color:white;
    border-top: 1px solid rgba(255,255,255,0.05);
}

/* DARK MODE OVERRIDES */
.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f1f5f9;
    --muted:#94a3b8;
